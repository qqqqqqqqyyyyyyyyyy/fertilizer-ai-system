<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>理财学习与实践规划助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page">
      <section class="intro">
        <p class="eyebrow">Finance Learning Planner</p>
        <h1>欢迎使用理财学习与实践规划助手</h1>
        <p class="summary">
          这里可以帮助你整理理财学习目标、规划实践步骤，并逐步建立适合自己的财务管理习惯。
          当前版本是一个最小 Flask Web 项目，暂不包含数据库、登录或 AI 调用。
        </p>
      </section>

      <section class="guide" aria-label="功能说明">
        <h2>你可以从这里开始</h2>
        <ul>
          <li>明确近期想学习的理财主题，例如预算、储蓄、基金、保险或资产配置。</li>
          <li>把学习内容拆成可执行的小任务，每周完成一到两个。</li>
          <li>记录实践结果，定期复盘自己的收支和投资决策。</li>
        </ul>
      </section>
    </main>
  </body>
</html>
